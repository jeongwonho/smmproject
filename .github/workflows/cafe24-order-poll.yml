name: Cafe24 Flow Tick

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:
    inputs:
      live_dispatch:
        description: "수동 실행에서도 공급사 발주/완료 처리를 허용합니다."
        required: false
        type: boolean
        default: false
      chain_runs_remaining:
        description: "현재 실행 이후 5분 간격으로 이어서 실행할 횟수입니다. 0이면 체인을 만들지 않습니다."
        required: false
        default: "0"

permissions:
  actions: write
  contents: read
  id-token: write

concurrency:
  group: instamart-cafe24-flow
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Run Cafe24 flow tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TICK_URL: https://smmproject-lime.vercel.app/api/cron/cafe24/flow-tick
          MANUAL_LIVE_DISPATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.live_dispatch == true }}
          CHAIN_RUNS_REMAINING: ${{ inputs.chain_runs_remaining || '0' }}
          SCHEDULE_CHAIN_RUNS: "6"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_started_seconds=$SECONDS
          oidc_token=""
          if [ -z "${CRON_SECRET:-}" ]; then
            oidc_token="$(curl --fail-with-body --show-error --silent \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=instamart-cron" | jq -r '.value // empty')"
          fi
          auth_token="${CRON_SECRET:-${oidc_token:-}}"
          if [ -z "${auth_token:-}" ]; then
            echo "Repository secret CRON_SECRET or GitHub Actions OIDC token is required for production cron auth." >&2
            exit 1
          fi

          dispatch_limit=50
          status_limit=75
          completion_limit=50
          allow_live_dispatch=false
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] || [ "${MANUAL_LIVE_DISPATCH}" = "true" ]; then
            allow_live_dispatch=true
          fi
          if [ "${allow_live_dispatch}" != "true" ]; then
            dispatch_limit=0
            completion_limit=0
          fi

          payload="$(
            jq -nc \
              --argjson lookbackMinutes 180 \
              --argjson useCursor true \
              --argjson overlapMinutes 20 \
              --argjson cafe24Limit 5 \
              --argjson pageLimit 200 \
              --argjson maxPages 3 \
              --argjson detailFetchLimit 50 \
              --argjson dispatchLimit "$dispatch_limit" \
              --argjson statusLimit "$status_limit" \
              --argjson completionLimit "$completion_limit" \
              --argjson requestTimeoutSeconds 5 \
              --argjson maxAttempts 1 \
              '{
                lookbackMinutes: $lookbackMinutes,
                useCursor: $useCursor,
                overlapMinutes: $overlapMinutes,
                cafe24Limit: $cafe24Limit,
                pageLimit: $pageLimit,
                maxPages: $maxPages,
                detailFetchLimit: $detailFetchLimit,
                dispatchLimit: $dispatchLimit,
                statusLimit: $statusLimit,
                completionLimit: $completionLimit,
                requestTimeoutSeconds: $requestTimeoutSeconds,
                maxAttempts: $maxAttempts
              }'
          )"

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -X POST "$TICK_URL" \
              -H "Authorization: Bearer ${auth_token}" \
              -H "X-GitHub-Repository: ${GITHUB_REPOSITORY}" \
              -H "X-GitHub-Run-Id: ${GITHUB_RUN_ID}" \
              -H "X-GitHub-Workflow: ${GITHUB_WORKFLOW}" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              -o "$response_file" \
              -w "%{http_code}"
          )"

          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cafe24 flow tick failed with HTTP ${http_code}"
            exit 1
          fi

          chain_runs_remaining="${CHAIN_RUNS_REMAINING:-0}"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            chain_runs_remaining="${SCHEDULE_CHAIN_RUNS:-6}"
          fi
          if ! [[ "$chain_runs_remaining" =~ ^[0-9]+$ ]]; then
            chain_runs_remaining=0
          fi
          if [ "$chain_runs_remaining" -gt 0 ]; then
            elapsed_seconds=$((SECONDS - run_started_seconds))
            sleep_seconds=$((300 - elapsed_seconds))
            if [ "$sleep_seconds" -gt 0 ]; then
              echo "Waiting ${sleep_seconds}s before dispatching the next Cafe24 flow tick."
              sleep "$sleep_seconds"
            fi

            next_remaining=$((chain_runs_remaining - 1))
            next_payload="$(
              jq -nc \
                --arg ref "${GITHUB_REF_NAME:-main}" \
                --argjson liveDispatch "$allow_live_dispatch" \
                --arg remaining "$next_remaining" \
                '{ref: $ref, inputs: {live_dispatch: $liveDispatch, chain_runs_remaining: $remaining}}'
            )"
            curl --fail-with-body --show-error --silent \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/cafe24-order-poll.yml/dispatches" \
              --data "$next_payload"
            echo "Dispatched next Cafe24 flow tick with chain_runs_remaining=${next_remaining}."
          fi
