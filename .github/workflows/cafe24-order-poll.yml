name: Instamart Automation Tick

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: instamart-automation
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run automation tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          TICK_URL: https://smmproject-lime.vercel.app/api/cron/automation/tick
        run: |
          set -euo pipefail
          auth_token="${CRON_SECRET:-${GITHUB_TOKEN:-}}"
          if [ -z "${auth_token:-}" ]; then
            echo "CRON_SECRET or GITHUB_TOKEN is required."
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -X POST "$TICK_URL" \
              -H "Authorization: Bearer ${auth_token}" \
              -H "X-GitHub-Repository: ${GITHUB_REPOSITORY}" \
              -H "X-GitHub-Run-Id: ${GITHUB_RUN_ID}" \
              -H "X-GitHub-Workflow: ${GITHUB_WORKFLOW}" \
              -H "Content-Type: application/json" \
              --data '{"lookbackDays":30,"supplierLimit":1,"supplierSyncLimit":0,"supplierHealthLimit":1,"cafe24Limit":1,"cafe24PageLimit":100,"cafe24MaxPages":1,"cafe24DetailFetchLimit":0,"dispatchLimit":5,"statusLimit":2,"completionLimit":2}' \
              -o "$response_file" \
              -w "%{http_code}"
          )"

          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Instamart automation tick failed with HTTP ${http_code}"
            exit 1
          fi
