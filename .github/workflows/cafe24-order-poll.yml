name: Cafe24 Flow Tick

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: instamart-cafe24-flow
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run Cafe24 flow tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TICK_URL: https://smmproject-lime.vercel.app/api/cron/cafe24/flow-tick
        run: |
          set -euo pipefail
          oidc_token=""
          if [ -z "${CRON_SECRET:-}" ]; then
            oidc_token="$(curl --fail-with-body --show-error --silent \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=instamart-cron" | jq -r '.value // empty')"
          fi
          auth_token="${CRON_SECRET:-${oidc_token:-}}"
          if [ -z "${auth_token:-}" ]; then
            echo "Repository secret CRON_SECRET or GitHub Actions OIDC token is required for production cron auth." >&2
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl -sS -X POST "$TICK_URL" \
              -H "Authorization: Bearer ${auth_token}" \
              -H "X-GitHub-Repository: ${GITHUB_REPOSITORY}" \
              -H "X-GitHub-Run-Id: ${GITHUB_RUN_ID}" \
              -H "X-GitHub-Workflow: ${GITHUB_WORKFLOW}" \
              -H "Content-Type: application/json" \
              --data '{"lookbackMinutes":180,"useCursor":true,"overlapMinutes":20,"cafe24Limit":5,"pageLimit":200,"maxPages":3,"detailFetchLimit":50,"dispatchLimit":50,"statusLimit":75,"completionLimit":50,"tokenRefreshWindowMinutes":30,"requestTimeoutSeconds":5,"maxAttempts":1,"compactResponse":true}' \
              -o "$response_file" \
              -w "%{http_code}"
          )"

          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Cafe24 flow tick failed with HTTP ${http_code}"
            exit 1
          fi

          if ! jq -e '.ok == true' "$response_file" >/dev/null; then
            echo "Cafe24 flow tick reported a partial failure"
            exit 1
          fi
