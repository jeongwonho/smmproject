name: Instamart Supplier Catalog Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: Max due suppliers to inspect
        required: true
        default: "10"
      request_timeout_seconds:
        description: Per supplier API request timeout
        required: true
        default: "6"

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: instamart-supplier-catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync due supplier services
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://smmproject-lime.vercel.app/api/cron/suppliers/sync
          LIMIT: ${{ github.event.inputs.limit || '10' }}
          REQUEST_TIMEOUT_SECONDS: ${{ github.event.inputs.request_timeout_seconds || '6' }}
        run: |
          set -euo pipefail
          oidc_token=""
          if [ -z "${CRON_SECRET:-}" ]; then
            oidc_token="$(curl --fail-with-body --show-error --silent \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=instamart-cron" | jq -r '.value // empty')"
          fi
          auth_token="${CRON_SECRET:-${oidc_token:-}}"
          if [ -z "${auth_token:-}" ]; then
            echo "Repository secret CRON_SECRET or GitHub Actions OIDC token is required for production cron auth." >&2
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl -sS --connect-timeout 10 --max-time 120 -X POST "$SYNC_URL" \
              -H "Authorization: Bearer ${auth_token}" \
              -H "X-GitHub-Repository: ${GITHUB_REPOSITORY}" \
              -H "X-GitHub-Run-Id: ${GITHUB_RUN_ID}" \
              -H "X-GitHub-Workflow: ${GITHUB_WORKFLOW}" \
              -H "Content-Type: application/json" \
              --data "$(jq -nc \
                --argjson limit "$LIMIT" \
                --argjson requestTimeoutSeconds "$REQUEST_TIMEOUT_SECONDS" \
                '{limit:$limit,requestTimeoutSeconds:$requestTimeoutSeconds}')" \
              -o "$response_file" \
              -w "%{http_code}"
          )"

          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Supplier catalog sync failed with HTTP ${http_code}"
            exit 1
          fi
